services:
  db:
    image: postgres:16
    # default bridge statt eigenem Compose-Netz — ein einzelner DB-Container
    # braucht kein eigenes Subnetz (und der Docker-Adresspool ist hier knapp)
    network_mode: bridge
    environment:
      POSTGRES_USER: lm
      POSTGRES_PASSWORD: lm
      POSTGRES_DB: leistungsmatrix
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lm -d leistungsmatrix"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  db-data:
